<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paco confío en ti - 2026</title>
    <style>
        /* Estilos generales */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fondo actualizado a un tono más solemne/motivacional */
            background: linear-gradient(135deg, #16222A, #3A6073); 
            height: 100vh;
            display: flex;
            justify_content: center;
            align-items: center;
            color: white;
            overflow: hidden; /* Evita barras de desplazamiento */
        }

        /* Contenedor principal */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05); /* Más sutil */
            padding: 3.5rem;
            border-radius: 25px;
            backdrop-filter: blur(15px); /* Efecto cristal más fuerte */
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
            width: 600px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            margin-bottom: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            /* Degradado en el texto para que destaque */
            background: -webkit-linear-gradient(#4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        p.subtitle {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            opacity: 0.8;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Rejilla del contador */
        .countdown {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        /* Cajas de tiempo individual */
        .time-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 20px;
            border-radius: 12px;
            min-width: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            font-feature-settings: "tnum"; /* Números monoespaciados para que no "bailen" */
            font-variant-numeric: tabular-nums;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 5px;
            color: #4facfe;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Diseño para móviles */
        @media (max-width: 600px) {
            .container { padding: 2rem; }
            h1 { font-size: 2rem; }
            .number { font-size: 1.8rem; }
            .time-box { min-width: 65px; padding: 10px; }
            .label { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Paco confío en ti</h1>
        <p class="subtitle">28 de Julio de 2026</p>
        
        <div class="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Días</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Segs</span>
            </div>
        </div>
    </div>

    <script>
        // Fecha objetivo: 28 de Julio de 2026
        const targetDate = new Date('July 28, 2026 00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const gap = targetDate - now;

            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            const d = Math.floor(gap / day);
            const h = Math.floor((gap % day) / hour);
            const m = Math.floor((gap % hour) / minute);
            const s = Math.floor((gap % minute) / second);

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
            document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;

            if (gap < 0) {
                document.querySelector('.container').innerHTML = "<h1>¡Paco lo ha conseguido!</h1>";
            }
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
